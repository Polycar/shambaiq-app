<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    text { font-family: 'Georgia', 'Times New Roman', serif; }
  </style>
  
  <!-- Concept 1: Leaf growing from data nodes -->
  <g transform="translate(120, 50)">
    <text x="0" y="0" font-size="11" fill="#666" font-family="Arial" font-weight="bold">CONCEPT 1 — Leaf + Data</text>
    
    <!-- Soil layer -->
    <ellipse cx="60" cy="250" rx="70" ry="12" fill="#8B6914" opacity="0.3"/>
    
    <!-- Stem -->
    <path d="M60 250 Q60 180 55 140 Q50 100 60 60" stroke="#15803d" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Main leaf -->
    <path d="M60 60 Q30 40 20 70 Q15 95 40 110 Q55 100 60 80 Q65 100 80 110 Q105 95 100 70 Q90 40 60 60Z" fill="#16a34a"/>
    
    <!-- Leaf vein -->
    <path d="M60 65 L60 100" stroke="#dcfce7" stroke-width="1.5" fill="none"/>
    <path d="M60 75 L45 85" stroke="#dcfce7" stroke-width="1" fill="none"/>
    <path d="M60 75 L75 85" stroke="#dcfce7" stroke-width="1" fill="none"/>
    <path d="M60 85 L50 95" stroke="#dcfce7" stroke-width="1" fill="none"/>
    <path d="M60 85 L70 95" stroke="#dcfce7" stroke-width="1" fill="none"/>
    
    <!-- Data nodes on stem -->
    <circle cx="58" cy="160" r="4" fill="#C8860A"/>
    <circle cx="57" cy="190" r="4" fill="#C8860A"/>
    <circle cx="59" cy="220" r="4" fill="#C8860A"/>
    
    <!-- Connection lines from nodes -->
    <line x1="58" y1="160" x2="80" y2="155" stroke="#C8860A" stroke-width="1" opacity="0.5"/>
    <line x1="57" y1="190" x2="35" y2="185" stroke="#C8860A" stroke-width="1" opacity="0.5"/>
    <line x1="59" y1="220" x2="82" y2="225" stroke="#C8860A" stroke-width="1" opacity="0.5"/>
    <circle cx="80" cy="155" r="2.5" fill="#C8860A" opacity="0.5"/>
    <circle cx="35" cy="185" r="2.5" fill="#C8860A" opacity="0.5"/>
    <circle cx="82" cy="225" r="2.5" fill="#C8860A" opacity="0.5"/>
    
    <!-- Text -->
    <text x="60" y="290" text-anchor="middle" font-size="32" fill="#1a3a1a" font-weight="bold">Shamba</text>
    <text x="60" y="320" text-anchor="middle" font-size="32" fill="#C8860A" font-weight="bold">IQ</text>
  </g>
  
  
  <!-- Concept 2: Map pin with sprouting plant -->
  <g transform="translate(320, 50)">
    <text x="0" y="0" font-size="11" fill="#666" font-family="Arial" font-weight="bold">CONCEPT 2 — Pin + Sprout</text>
    
    <!-- Map pin body -->
    <path d="M60 240 L35 140 Q30 100 60 80 Q90 100 85 140 Z" fill="#15803d"/>
    
    <!-- Pin inner circle -->
    <circle cx="60" cy="130" r="22" fill="#dcfce7"/>
    
    <!-- Sprout inside pin -->
    <path d="M60 140 L60 118" stroke="#15803d" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 125 Q48 115 50 108 Q55 105 60 118" fill="#16a34a"/>
    <path d="M60 130 Q72 120 70 113 Q65 110 60 122" fill="#16a34a"/>
    
    <!-- Soil dots at base -->
    <circle cx="45" cy="245" r="2" fill="#8B6914" opacity="0.4"/>
    <circle cx="55" cy="248" r="2.5" fill="#8B6914" opacity="0.4"/>
    <circle cx="65" cy="247" r="2" fill="#8B6914" opacity="0.4"/>
    <circle cx="75" cy="244" r="2.5" fill="#8B6914" opacity="0.4"/>
    
    <!-- Text -->
    <text x="60" y="290" text-anchor="middle" font-size="32" fill="#1a3a1a" font-weight="bold">Shamba</text>
    <text x="60" y="320" text-anchor="middle" font-size="32" fill="#C8860A" font-weight="bold">IQ</text>
  </g>
  
  
  <!-- Concept 3: Hexagonal soil layers (science feel) -->
  <g transform="translate(520, 50)">
    <text x="0" y="0" font-size="11" fill="#666" font-family="Arial" font-weight="bold">CONCEPT 3 — Hex + Layers</text>
    
    <!-- Hexagon outline -->
    <polygon points="60,60 100,82 100,128 60,150 20,128 20,82" fill="none" stroke="#15803d" stroke-width="3"/>
    
    <!-- Soil layers inside hexagon -->
    <clipPath id="hex-clip">
      <polygon points="60,60 100,82 100,128 60,150 20,128 20,82"/>
    </clipPath>
    <g clip-path="url(#hex-clip)">
      <!-- Top layer - green (organic) -->
      <rect x="15" y="55" width="90" height="25" fill="#16a34a"/>
      <!-- Middle layer - brown (topsoil) -->
      <rect x="15" y="80" width="90" height="25" fill="#8B6914"/>
      <!-- Lower layer - tan (subsoil) -->
      <rect x="15" y="105" width="90" height="25" fill="#C8860A"/>
      <!-- Bottom layer - dark (bedrock) -->
      <rect x="15" y="130" width="90" height="25" fill="#5C4A1A"/>
    </g>
    
    <!-- Small leaf on top -->
    <path d="M60 60 Q50 45 55 35 Q58 32 60 48 Q62 32 65 35 Q70 45 60 60Z" fill="#16a34a"/>
    
    <!-- pH / N / P / K labels -->
    <text x="60" y="75" text-anchor="middle" font-size="9" fill="white" font-family="Arial" font-weight="bold">pH 6.2</text>
    <text x="60" y="98" text-anchor="middle" font-size="9" fill="white" font-family="Arial" font-weight="bold">N 1.59</text>
    <text x="60" y="120" text-anchor="middle" font-size="9" fill="white" font-family="Arial" font-weight="bold">P 25.2</text>
    <text x="60" y="143" text-anchor="middle" font-size="9" fill="white" font-family="Arial" font-weight="bold">K 239</text>
    
    <!-- Text -->
    <text x="60" y="200" text-anchor="middle" font-size="32" fill="#1a3a1a" font-weight="bold">Shamba</text>
    <text x="60" y="230" text-anchor="middle" font-size="32" fill="#C8860A" font-weight="bold">IQ</text>
  </g>
  
  
  <!-- Color palette reference -->
  <g transform="translate(120, 370)">
    <rect x="0" y="0" width="30" height="16" rx="3" fill="#1a3a1a"/>
    <text x="36" y="12" font-size="10" fill="#666" font-family="Arial">Dark Green</text>
    <rect x="120" y="0" width="30" height="16" rx="3" fill="#16a34a"/>
    <text x="156" y="12" font-size="10" fill="#666" font-family="Arial">ShambaIQ Green</text>
    <rect x="280" y="0" width="30" height="16" rx="3" fill="#C8860A"/>
    <text x="316" y="12" font-size="10" fill="#666" font-family="Arial">Gold</text>
    <rect x="380" y="0" width="30" height="16" rx="3" fill="#8B6914"/>
    <text x="416" y="12" font-size="10" fill="#666" font-family="Arial">Earth Brown</text>
    <rect x="510" y="0" width="30" height="16" rx="3" fill="#F5F0E1"/>
    <text x="546" y="12" font-size="10" fill="#666" font-family="Arial">Cream</text>
  </g>
</svg>
